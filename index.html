<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тренажер слов</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 10px;
            background: #f4f4f9;
        }

        /* Стили счетчиков */
        .stats {
            font-size: 1.0rem;
            font-weight: bold;
            margin-bottom: 20px;
            background: white;
            padding: 10px 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            display: space-around; /* Выстраиваем в ряд */
            justify-content: center;
            width: 90%; /* Адаптивная ширина */
            max-width: 450px;
            box-sizing: border-box;
        }

        .stat-total {
            color: #333;
        }

        .stat-correct {
            color: #27ae60;
            margin: 0 15px;
        }

        .stat-wrong {
            color: #e74c3c;
        }

        .card {
            background: white;
            padding: 20px;
            padding: 1.5rem;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            /* 2. ИЗМЕНЕНО: Ширина теперь гибкая, до 400px */
            width: 90%;
            max-width: 450px;
            box-sizing: border-box; /* Чтобы padding не раздувал ширину */
            text-align: center;
        }

        #ru-word {
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 5px;
            color: #333;
        }

        #correct-answer {
            height: 1.5rem;
            color: #4f46e5;
            font-weight: bold;
            margin-bottom: 20px;
        }

        #descr {
            padding: 10px;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        button {
            padding: 15px 10px; /* Больше отступы внутри кнопок */
            border: 1px solid #ddd;
            border-radius: 10px;
            cursor: pointer;
            background: white;
            transition: 0.2s;
            font-size: 1.0rem;
            -webkit-tap-highlight-color: transparent; /* Убирает синюю рамку при нажатии на iOS */
        }

        .level-selector {
            margin-bottom: 15px;
            display: flex;
            flex-wrap: wrap; /* Если не влезут в ряд — перенесутся */
            justify-content: center;
            gap: 8px;
        }

        button:hover:not(:disabled) {
            background: #eef2ff;
            border-color: #4f46e5;
        }

        button.correct {
            background: #27ae60 !important;
            color: white;
            border-color: #27ae60;
        }

        button.wrong {
            background: #e74c3c !important;
            color: white;
            border-color: #e74c3c;
        }

        button.highlight-correct {
            background: #f39c12 !important;
            color: white;
            border-color: #e67e22;
        }
        /* Оранжевый */


        .next-btn {
            margin-top: 25px;
            width: 100%;
            padding: 12px;
            background: #4f46e5;
            color: white;
            border: 1px solid #eef2ff;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            display: none;
        }

            .next-btn:hover {
                background: #eef2ff;
                border-color: #4f46e5;
                color: #4f46e5;
            }

        .level-selector {
            margin-bottom: 15px;
            display: flex;
            gap: 8px;
        }

            .level-selector button {
                background: #e2e8f0;
                border: none;
                padding: 8px 15px;
                font-weight: bold;
                color: #475569;
            }

                .level-selector button:hover {
                    background: #cbd5e1;
                }
        /* Подсветка активного уровня (опционально) */
        .level-active {
            background: #4f46e5 !important;
            color: white !important;
        }
    </style>
</head>
<body>
 <div class="level-selector">
     <button onclick="setDictionary('1')">0-2</button>
     <button onclick="setDictionary('2')">2-4</button>
     <button onclick="setDictionary('3')">4-6</button>
     <button onclick="setDictionary('4')">6-8</button>
</div>
<div class="stats">
    <span class="stat-total" id="total-count">Всего: 0</span>
    <span class="stat-correct" id="correct-count">Верно: 0</span>
    <span class="stat-wrong" id="wrong-count">Ошибки: 0</span>
</div>

<div class="card">
    <div id="ru-word">Выберите словарь</div>
    <div id="correct-answer"></div>

    <div id="options" class="options-grid"></div> 
    <div id="descr"></div>
    <button id="next-btn" class="next-btn">Далее →</button>
</div>

<script>
    let allWords = [];
    

    let currentWordsSelection = [];
    let currentIndex = 0;
    let repeatIndex = 0;
    let isRepeat = true;
    
    // Переменные счетчиков
    let countTotal = 0;
    let countCorrect = 0;
    let countWrong = 0;
    let isAnswered = false;


    const ruDisplay = document.getElementById('ru-word');
    const descrDisplay = document.getElementById('descr');    
    const answerDisplay = document.getElementById('correct-answer');
    const optionsContainer = document.getElementById('options');
    const nextBtn = document.getElementById('next-btn');

    // Элементы счетчиков
    const totalEl = document.getElementById('total-count');
    const correctEl = document.getElementById('correct-count');
    const wrongEl = document.getElementById('wrong-count');

    async function init() {
        try {
            //const response = await fetch('words.json');
            //allWords = await response.json();
            
            let today = new Date().getDate()-1;
            if (today > 30) {
                today = 30;
            }
            today = today % 10;
            currentWordsSelection = allWords
                .filter(item => String(item.day) === String(today))
                .sort(() => 0.5 - Math.random())
                .slice(0, 50);

            if (currentWordsSelection.length > 0) {
                renderStep(currentIndex);
            } else {
                ruDisplay.textContent = "Слов на сегодня нет";
            }
        } catch (e) {
            ruDisplay.textContent = "Ошибка загрузки JSON";
        }
    }


    function setDictionary(dictNum) {
        // 1. Переопределяем данные
        allWords = dataSets[dictNum];
        //debugger; 
        console.log(dataSets.length);
        // 2. Сбрасываем прогресс
        currentIndex = 0;
        countTotal = 0;
        countCorrect = 0;
        countWrong = 0;

        // 3. Обновляем счетчики на экране
        totalEl.textContent = "Всего: 0";
        correctEl.textContent = "Верно: 0";
        wrongEl.textContent = "Ошибки: 0";

        // 4. Подсвечиваем активную кнопку (визуально)
        document.querySelectorAll('.level-selector button').forEach((btn, idx) => {
            btn.classList.toggle('level-active', (idx + 1) === dictNum);
        });

        // 5. Запускаем тренажер заново с новыми словами
        init();
    }


    function renderStep(index) {
        isAnswered = false;
        const currentItem = currentWordsSelection[index];
        
        answerDisplay.textContent = "";
        nextBtn.style.display = "none";
        optionsContainer.innerHTML = "";

        //const randomRu = currentItem.ru[Math.floor(Math.random() * currentItem.ru.length)];
      
        const words = currentItem.ru
            .replace(/\s*\(.*?\)/g, "") // Удаляем скобки
            .split(",")                 // Разбиваем по запятой
            .map(w => w.trim())         // Убираем пробелы
            .filter(w => w.length > 0); // Удаляем пустые элементы, если они есть

        let randomRu;

        if (words.length <= 2) {
            randomRu = words.join(", ");
        } else {
            const shuffled = [...words].sort(() => 0.5 - Math.random());
            randomRu = shuffled.slice(0, 2).join(", ");
        }

        ruDisplay.textContent = randomRu;

        let candidates = allWords
            .filter(w => w.en !== currentItem.en)
            .sort(() => 0.5 - Math.random())
            .slice(0, 11)
            .map(w => w);

        let options = [currentItem];
        options = [...options, ...candidates].sort(() => 0.5 - Math.random());

        options.forEach(item => {
            const btn = document.createElement('button');
            btn.textContent = item.en;
            btn.onclick = () => handleBtnClick(btn, item.en, currentItem.en, item.ru); 
            optionsContainer.appendChild(btn);
        });
    }

    function handleBtnClick(selectedBtn, selectedWord, correctWord, selectedDescribe) {   
        descrDisplay.textContent = selectedDescribe;
        speak(selectedWord);
        if (!isAnswered) {
            checkAnswer(selectedBtn, selectedWord, correctWord);
        }
    }


    function checkAnswer(selectedBtn, selectedWord, correctWord) {
        const allBtns = optionsContainer.querySelectorAll('button');
        //allBtns.forEach(b => b.disabled = true);

        // Обновляем общий счетчик пройденных слов
        isAnswered = true;
        countTotal++;
        totalEl.textContent = `Всего: ${countTotal}`;
        
        if (selectedWord === correctWord) {
            selectedBtn.classList.add('correct');
            countCorrect++;
            correctEl.textContent = `Верно: ${countCorrect}`;
        } else {
            selectedBtn.classList.add('wrong');
            countWrong++;
            wrongEl.textContent = `Ошибки: ${countWrong}`;
            
            // Опционально: подсветить правильную кнопку, если пользователь ошибся
            allBtns.forEach(b => {
                if (b.textContent === correctWord) b.classList.add('highlight-correct');
            });
        }

        answerDisplay.textContent = correctWord;
        nextBtn.style.display = "block";
    }

    nextBtn.onclick = () => {
        descrDisplay.textContent = "";
        let renderIndex = null;
        if ((( isRepeat && currentIndex > 8) || (currentIndex + 1) >= currentWordsSelection.length) && (repeatIndex + 1) < currentWordsSelection.length) {
            repeatIndex++;
            renderIndex = repeatIndex;  
            isRepeat = false;
        } else if ((currentIndex +1) < currentWordsSelection.length) {
            currentIndex++;
            renderIndex = currentIndex;
            isRepeat = true;
        }

        if (renderIndex !== null) {
            renderStep(renderIndex);
        } else {        
            ruDisplay.textContent = "Урок окончен!";
            answerDisplay.textContent = `Результат: ${countCorrect} из ${countTotal}`;
            optionsContainer.innerHTML = "";
            nextBtn.style.display = "none";
        }
    };

    const voices = window.speechSynthesis.getVoices();
    // Обычно это 'Google US English' или 'Samantha'
    /*const voice = voices.find(v =>
        (v.lang.includes('en') || v.lang.includes('en-US')) &&
        (v.name.toLowerCase().includes('female') || v.name.toLowerCase().includes('google') || v.name.toLowerCase().includes('samantha'))
    );*/
    const voice = voices.find(v =>
        v.lang === 'en-GB' &&
        ['Serena', 'Stephanie', 'Daniel', 'Google UK English'].some(name => v.name.includes(name))
    ) || voices.find(v => v.lang === 'en-GB');


    function speak(text) {
        // Отменяем текущую озвучку, если она идет (чтобы не наслаивалось)
        window.speechSynthesis.cancel();

        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'en-GB'; // Устанавливаем английский язык
        utterance.rate = 0.9;     // Немного замедляем скорость для четкости
        utterance.pitch = 1.0;    // Высота голоса
        if (voice) utterance.voice = voice;
        window.speechSynthesis.speak(utterance);
    }
